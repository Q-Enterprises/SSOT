name: CI Workflow

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js and Python
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Build project
        run: pnpm build

      - name: Run tests with coverage
        run: pnpm test -- --coverage

      - name: Verify Fossil Chain
        run: python3 -c "import sys; from previz import store; sys.exit(0 if store.verifyChain().valid else 1)"

      # Ensure your test suite includes:
      # 1. Consent router: unknown agent -> message_refused fossil assertion.
      # 2. Merkle root: assertion against test fixture for determinism.

      - name: Workflow Status Notification
        if: always()
        run: |
          curl -X POST https://hooks.zapier.com/hooks/catch/YOUR_ZAPIER_ID/ \
            -H "Content-Type: application/json" \
            -d '{
              "status": "${{ job.status }}",
              "run_id": "${{ github.run_id }}",
              "repository": "${{ github.repository }}",
              "branch": "${{ github.ref_name }}"
            }'
